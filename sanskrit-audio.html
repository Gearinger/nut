<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梵语发音学习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .header p {
      opacity: 0.7;
    }
    .cards {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }
    .card-left {
      flex: 1;
    }
    .card .sanskrit {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .card .pronunciation {
      color: #fbbf24;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .card .meaning {
      opacity: 0.8;
      font-size: 0.9rem;
    }
    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #fbbf24;
      color: #1a1a2e;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.1);
    }
    .play-btn.playing {
      animation: pulse 0.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.5;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧘 梵语发音入门</h1>
    <p>点击播放按钮，听梵语发音</p>
  </div>
  
  <div class="cards" id="cards"></div>
  
  <div class="footer">
    <p>使用浏览器语音合成 • 支持Chrome/Safari/Edge</p>
  </div>

  <script>
    const vocabData = [
      { sa: "ॐ", pron: "奥姆", meaning: "宇宙本源之声" },
      { sa: "धर्म", pron: "达尔玛", meaning: "法则、正法" },
      { sa: "कर्म", pron: "卡尔玛", meaning: "业力" },
      { sa: "बुद्ध", pron: "布达", meaning: "觉悟者" },
      { sa: "निर्वाण", pron: "尼尔瓦纳", meaning: "涅槃、解脱" },
      { sa: "संसार", pron: "三萨拉", meaning: "轮回" },
      { sa: "माया", pron: "玛亚", meaning: "幻象" },
      { sa: "आत्मन्", pron: "阿特曼", meaning: "自我、灵魂" },
      { sa: "ब्रह्मन्", pron: "布拉曼", meaning: "宇宙本体" },
      { sa: "शांति", pron: "香提", meaning: "和平、宁静" }
    ];

    const cardsContainer = document.getElementById('cards');
    
    vocabData.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-left">
          <div class="sanskrit">${item.sa}</div>
          <div class="pronunciation">${item.pron}</div>
          <div class="meaning">${item.meaning}</div>
        </div>
        <button class="play-btn" onclick="speak('${item.sa}', this)">🔊</button>
      `;
      cardsContainer.appendChild(card);
    });

    function speak(text, btn) {
      if (btn.classList.contains('playing')) return;
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'sa-IN'; // 梵语
      utterance.rate = 0.7; // 慢一点
      
      // 尝试找梵语语音
      const voices = speechSynthesis.getVoices();
      const hiVoice = voices.find(v => v.lang.includes('hi') || v.lang.includes('sa'));
      if (hiVoice) utterance.voice = hiVoice;
      
      utterance.onstart = () => btn.classList.add('playing');
      utterance.onend = () => btn.classList.remove('playing');
      utterance.onerror = () => btn.classList.remove('playing');
      
      speechSynthesis.speak(utterance);
    }

    // 预加载语音
    speechSynthesis.getVoices();
  </script>
</body>
</html>
